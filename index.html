  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Archivo", "system-ui", "sans-serif"],
            display: ["var(--font-display)", "Saira Condensed", "sans-serif"],
          },

      },
    };

  <style>
    :root {
      --bg: #070b0a;
      --bg-2: #0d1411;
      --green: #10b981;
      --green-bright: #34d399;
      --gold: #fbbf24;
      --font-display: 'Saira Condensed', sans-serif;
    }
    html { background: var(--bg); }
    body {
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(16,185,129,0.10), transparent 60%),
        var(--bg);
      color: #f4f7f5;
      font-family: 'Archivo', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .font-display { font-family: var(--font-display); }

    /* faint pitch-line texture overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 119px, rgba(255,255,255,0.014) 119px, rgba(255,255,255,0.014) 120px
      );
    }
    #root { position: relative; z-index: 1; }

    /* pulso quando um valor atualiza */
    @keyframes gfc-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.16); }
      100% { transform: scale(1); }
    }
    .gfc-pop { animation: gfc-pop 0.6s cubic-bezier(.34,1.56,.64,1); }

    /* item novo do feed deslizando */
    @keyframes gfc-slide-in {
      0%   { opacity: 0; transform: translateY(-14px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .gfc-slide-in { animation: gfc-slide-in 0.5s cubic-bezier(.22,.8,.28,1); }

    /* toast */
    @keyframes gfc-toast {
      0%   { opacity: 0; transform: translate(-50%, 16px) scale(0.95); }
      12%  { opacity: 1; transform: translate(-50%, 0) scale(1); }
      88%  { opacity: 1; transform: translate(-50%, 0) scale(1); }
      100% { opacity: 0; transform: translate(-50%, 8px) scale(0.98); }
    }
    .gfc-toast { animation: gfc-toast 2.6s ease forwards; }

    /* === Hero entrance — elementos entram em sequência === */
    @keyframes gfc-fade-up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .gfc-enter { opacity: 0; animation: gfc-fade-up 0.65s cubic-bezier(.22,.8,.28,1) forwards; }
    .gfc-enter-1 { animation-delay: 0.05s; }
    .gfc-enter-2 { animation-delay: 0.18s; }
    .gfc-enter-3 { animation-delay: 0.30s; }
    .gfc-enter-4 { animation-delay: 0.44s; }
    .gfc-enter-5 { animation-delay: 0.58s; }
    .gfc-enter-6 { animation-delay: 0.70s; }

    /* === Shimmer nos top 3 do ranking === */
    @keyframes gfc-shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }
    .gfc-rank-shimmer {
      background: linear-gradient(90deg, #c88c00 15%, #fff8c0 46%, #fbbf24 56%, #c88c00 85%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gfc-shimmer 3s linear infinite;
    }
    .gfc-rank-shimmer-2 {
      background: linear-gradient(90deg, #8aa49e 15%, #eaf3f0 46%, #d6e4dc 56%, #8aa49e 85%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gfc-shimmer 3.4s linear infinite;
    }
    .gfc-rank-shimmer-3 {
      background: linear-gradient(90deg, #a85c28 15%, #f5cfa0 46%, #e8a87c 56%, #a85c28 85%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gfc-shimmer 3.8s linear infinite;
    }

    /* === Seta flutuante quando país sobe de posição === */
    @keyframes gfc-rise {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.3); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-22px) scale(0.85); }
    }
    .gfc-rise-badge { animation: gfc-rise 1.3s cubic-bezier(.22,.8,.28,1) forwards; }

    /* === Pulso heartbeat no botão CTA === */
    @keyframes gfc-cta-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.50), 0 20px 40px -12px rgba(16,185,129,0.30); }
      55%       { box-shadow: 0 0 0 18px rgba(16,185,129,0),  0 20px 40px -12px rgba(16,185,129,0.30); }
    }
    .gfc-cta-pulse { animation: gfc-cta-pulse 2.4s ease-out infinite; }

    /* === Scroll reveal para seções abaixo da dobra === */
    @keyframes gfc-reveal {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .gfc-section-hidden  { opacity: 0; }
    .gfc-section-visible { animation: gfc-reveal 0.72s cubic-bezier(.22,.8,.28,1) forwards; }

    /* === Hover lift nos cards de pacote === */
    .gfc-card-hover:hover { transform: translateY(-4px); box-shadow: 0 0 22px rgba(16,185,129,0.28), 0 0 50px rgba(16,185,129,0.10); }

    /* === BATTLE BARS === */
    @keyframes gfc-bar-flash {
      0%   { filter: brightness(1) saturate(1); }
      25%  { filter: brightness(3) saturate(2.5); }
      100% { filter: brightness(1) saturate(1); }
    }
    .gfc-bar-flash      { animation: gfc-bar-flash 0.75s ease-out; }
    .gfc-bar-flash-gold { animation: gfc-bar-flash 0.75s ease-out; }

    @keyframes gfc-vs-pulse {
      0%, 100% { opacity: 0.22; transform: scale(1); }
      50%       { opacity: 0.75; transform: scale(1.10);
                  text-shadow: 0 0 24px rgba(255,255,255,0.6), 0 0 50px rgba(16,185,129,0.8); }
    }
    .gfc-vs-text { animation: gfc-vs-pulse 2s ease-in-out infinite; }

    @keyframes gfc-boost-float {
      0%   { opacity: 1; transform: translateY(0)  scale(1); }
      100% { opacity: 0; transform: translateY(-48px) scale(1.3); }
    }
    .gfc-boost-float { animation: gfc-boost-float 1.1s ease-out forwards; }

    @keyframes gfc-ko-pop {
      0%   { opacity: 0; transform: scale(0.2) rotate(-15deg); }
      30%  { opacity: 1; transform: scale(1.5) rotate(6deg); }
      55%  { transform: scale(1.15) rotate(-3deg); }
      75%  { opacity: 1; transform: scale(1.12) rotate(0deg); }
      100% { opacity: 0; transform: scale(0.9) translateY(-25px); }
    }
    .gfc-ko-pop { animation: gfc-ko-pop 2.5s ease-out forwards; pointer-events:none; }

    @keyframes gfc-arena-breathe {
      0%, 100% { box-shadow: 0 0 40px rgba(16,185,129,0.10), 0 0 0 1px rgba(16,185,129,0.22); }
      50%       { box-shadow: 0 0 90px rgba(16,185,129,0.28), 0 0 0 1px rgba(16,185,129,0.42); }
    }
    .gfc-arena { animation: gfc-arena-breathe 3s ease-in-out infinite; }

    /* === NEON / GAMER AESTHETIC ================================= */
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(16,185,129,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .gfc-neon-gold   { filter: drop-shadow(0 0 6px rgba(251,191,36,0.95))  drop-shadow(0 0 16px rgba(251,191,36,0.5)); }
    .gfc-neon-silver { filter: drop-shadow(0 0 5px rgba(214,228,220,0.85)) drop-shadow(0 0 12px rgba(214,228,220,0.4)); }
    .gfc-neon-bronze { filter: drop-shadow(0 0 5px rgba(232,168,124,0.85)) drop-shadow(0 0 12px rgba(232,168,124,0.4)); }
    .gfc-neon-green  { filter: drop-shadow(0 0 6px rgba(16,185,129,0.95))  drop-shadow(0 0 16px rgba(16,185,129,0.5)); }
    .gfc-box-neon        { box-shadow: 0 0 14px rgba(16,185,129,0.20), 0 0 40px rgba(16,185,129,0.07), inset 0 0 12px rgba(16,185,129,0.04); }
    .gfc-box-neon-strong { box-shadow: 0 0 22px rgba(16,185,129,0.42), 0 0 60px rgba(16,185,129,0.16), inset 0 0 16px rgba(16,185,129,0.06); }
    .gfc-row-gold   { box-shadow: inset 0 0 50px rgba(251,191,36,0.04),  0 0 14px rgba(251,191,36,0.07); }
    .gfc-row-silver { box-shadow: inset 0 0 50px rgba(214,228,220,0.03), 0 0 10px rgba(214,228,220,0.05); }
    .gfc-row-bronze { box-shadow: inset 0 0 50px rgba(232,168,124,0.03), 0 0 10px rgba(232,168,124,0.05); }
    .gfc-kicker     { text-shadow: 0 0 10px var(--green-bright), 0 0 24px rgba(52,211,153,0.35); letter-spacing: 0.26em; }
    .gfc-live-core  { box-shadow: 0 0 4px var(--green), 0 0 10px var(--green), 0 0 20px rgba(16,185,129,0.6); }
    @keyframes gfc-glitch {
      0%, 87%, 100% { transform: translate(0); }
      88% { transform: translate(-3px, 1px);  text-shadow: 3px 0 rgba(16,185,129,0.75), -3px 0 rgba(251,191,36,0.75); }
      89% { transform: translate( 3px, -1px); text-shadow: -3px 0 rgba(16,185,129,0.75),  3px 0 rgba(251,191,36,0.75); }
      90% { transform: translate(-1px, 2px);  text-shadow: none; }
      91% { transform: translate(0); }
    }
    .gfc-glitch { animation: gfc-glitch 8s ease infinite; }
    @keyframes gfc-scan {
      0%   { top: -8%; opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 0.7; }
      100% { top: 108%; opacity: 0; }
    }
    .gfc-scanline { position: relative; overflow: hidden; }
    .gfc-scanline::after {
      content: ''; position: absolute; left: 0; right: 0; height: 56px;
      background: linear-gradient(to bottom, transparent, rgba(16,185,129,0.055) 50%, transparent);
      animation: gfc-scan 5s ease-in-out infinite;
      pointer-events: none; z-index: 2;
    }
    @keyframes gfc-log-neon {
      0%   { box-shadow: 0 0 0 1px rgba(16,185,129,0.9), 0 0 22px rgba(16,185,129,0.55); background-color: rgba(16,185,129,0.14); }
      100% { box-shadow: none; background-color: rgba(255,255,255,0.03); }
    }
    .gfc-log-neon-flash { animation: gfc-slide-in 0.5s cubic-bezier(.22,.8,.28,1), gfc-log-neon 2s ease-out 0.1s forwards; }
    @keyframes gfc-cta-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.65), 0 0 30px rgba(16,185,129,0.28); }
      55%       { box-shadow: 0 0 0 22px rgba(16,185,129,0), 0 0 30px rgba(16,185,129,0.28); }
    }

    /* === Confetti ao apoiar === */
    @keyframes gfc-confetti-fall {
      0%   { opacity: 1; transform: translateY(-10px) translateX(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(300px) translateX(var(--cdx)) rotate(600deg) scale(0.35); }
    }

    select option { background: #0d1411; }
    ::selection { background: var(--green); color: #04130c; }
  </style>
</head>

    { country: "Argentina",      flag_emoji: "🇦🇷", points: 500,  display_name: "Diego M.",  created_at: Date.now() - 14000 },
    { country: "Brasil",         flag_emoji: "🇧🇷", points: 1000, display_name: null,         created_at: Date.now() - 52000 },
    { country: "Francia",        flag_emoji: "🇫🇷", points: 100,  display_name: "Camille",    created_at: Date.now() - 96000 },
    { country: "México",         flag_emoji: "🇲🇽", points: 500,  display_name: "Sofía R.",   created_at: Date.now() - 168000 },
    { country: "Portugal",       flag_emoji: "🇵🇹", points: 100,  display_name: null,         created_at: Date.now() - 240000 },
    { country: "Colombia",       flag_emoji: "🇨🇴", points: 1000, display_name: "Andrés",     created_at: Date.now() - 420000 },
  ],

  /* ----- countryToCurrency --------------------------------------------
     iso2 → código de moeda. Fallback "USD" quando não suportada.         */
  countryToCurrency: {
    BR: "BRL", AR: "ARS", FR: "EUR", ES: "EUR", EN: "USD", MX: "MXN",
    PT: "EUR", DE: "EUR", CO: "COP", US: "USD", NL: "EUR", UY: "USD",
    CL: "CLP", PE: "PEN", HR: "EUR", JP: "USD",
  },

  /* ----- currencyMeta --------------------------------------------------
     Formatação por moeda (symbol + locale para Intl.NumberFormat).       */
  currencyMeta: {
    USD: { symbol: "$",  locale: "en-US" },
    BRL: { symbol: "R$", locale: "pt-BR" },
    MXN: { symbol: "$",  locale: "es-MX" },
    ARS: { symbol: "$",  locale: "es-AR" },
    CLP: { symbol: "$",  locale: "es-CL" },
    COP: { symbol: "$",  locale: "es-CO" },
    PEN: { symbol: "S/", locale: "es-PE" },
    EUR: { symbol: "€",  locale: "de-DE" },
  },

  /* Moedas com preço definido. Fora desta lista → fallback USD. */
  supportedCurrencies: ["BRL", "USD", "MXN", "ARS", "CLP", "COP", "PEN", "EUR"],

/* ----- helpers de formatação ------------------------------------------ */

/* Resolve a moeda de um país (com fallback USD). */
window.GFC.currencyForCountry = function (iso2) {
  const cur = window.GFC.countryToCurrency[iso2] || "USD";
  return window.GFC.supportedCurrencies.includes(cur) ? cur : "USD";
};

/* Formata centavos numa moeda. Usa Intl com locale da currencyMeta. */
window.GFC.formatPrice = function (cents, currency) {
  const meta = window.GFC.currencyMeta[currency] || window.GFC.currencyMeta.USD;
  const value = cents / 100;
  try {
    return new Intl.NumberFormat(meta.locale, {
      style: "currency",
      currency: currency,
      maximumFractionDigits: ["CLP", "COP", "ARS"].includes(currency) ? 0 : 2,
    }).format(value);
  } catch (e) {
    return meta.symbol + value.toLocaleString();
  }
};

/* Tiempo relativo en ES ("ahora", "hace 2 min", "hace 1 h"). */
window.GFC.relativeTime = function (ts) {
  const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (s < 8) return "ahora";
  if (s < 60) return `hace ${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `hace ${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `hace ${h} h`;
  return `hace ${Math.floor(h / 24)} d`;
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const { useState, useEffect, useRef, useLayoutEffect } = React;

/* ---------------------------------------------------------------------------
   LiveCounter — número que faz count-up animado quando o valor muda.
   ------------------------------------------------------------------------ */
function LiveCounter({ value, duration = 900, className = "", style = {} }) {
  const [display, setDisplay] = useState(value);
  const fromRef = useRef(value);
  const rafRef = useRef(null);

  useEffect(() => {
    const from = fromRef.current;
    const to = value;
    if (from === to) return;
    const start = performance.now();
    cancelAnimationFrame(rafRef.current);
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(Math.round(from + (to - from) * eased));
      if (t < 1) rafRef.current = requestAnimationFrame(tick);
      else fromRef.current = to;
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value, duration]);

  return (
    <span className={"tabular-nums " + className} style={style}>
      {display.toLocaleString("pt-BR")}
    </span>
  );
}

/* ---------------------------------------------------------------------------
   LeaderboardRow — uma linha do ranking. Pulsa quando os pontos mudam.
   forwardRef para o FLIP de reordenação no pai.
   ------------------------------------------------------------------------ */
const LeaderboardRow = React.forwardRef(function LeaderboardRow(
  { rank, country, isUser, justChanged, motion }, ref
) {
  const top3 = rank <= 3;

  const [riseKey, setRiseKey] = useState(0);
  const [showRise, setShowRise] = useState(false);
  const prevRankRef = useRef(rank);
  const riseTimerRef = useRef(null);

  useEffect(() => {
    const prev = prevRankRef.current;
    prevRankRef.current = rank;
    if (motion === "off" || prev === rank) return;
    if (prev > rank) {
      clearTimeout(riseTimerRef.current);
      setRiseKey((k) => k + 1);
      setShowRise(true);
      riseTimerRef.current = setTimeout(() => setShowRise(false), 1400);
    }
  }, [rank, motion]);

  const shimmerClass =
    rank === 1 ? "gfc-rank-shimmer gfc-neon-gold" :
    rank === 2 ? "gfc-rank-shimmer-2 gfc-neon-silver" :

    rank === 2 ? "gfc-row-silver" :
    rank === 3 ? "gfc-row-bronze" : "";

    <div

      className={
        "relative flex items-center gap-3 sm:gap-4 rounded-2xl px-3 sm:px-4 py-3 " +
        "transition-all duration-300 will-change-transform " +
        (isUser
          ? "bg-[var(--green)]/15 ring-1 ring-[var(--green)]/60 gfc-box-neon-strong"
          : "bg-white/[0.025] hover:bg-white/[0.05] ring-1 ring-white/5 " + rowGlowClass)
      }

      <div className={"relative w-9 sm:w-11 shrink-0 text-center font-display font-extrabold tabular-nums " +
        (!top3 ? "text-white/35" : "") + " " +
        (top3 ? "text-2xl sm:text-3xl" : "text-lg sm:text-xl")}>
        {top3 ? <span className={shimmerClass}>{rank}</span> : rank}
        {showRise && (

/* ---------------------------------------------------------------------------
   ConfettiBurst — partículas explodem ao completar um apoio.
   triggerKey: número que incrementa a cada disparo.
   ------------------------------------------------------------------------ */
function ConfettiBurst({ triggerKey }) {
  const [particles, setParticles] = useState([]);
  const didMount = useRef(false);

  useEffect(() => {
    if (!didMount.current) { didMount.current = true; return; }
    if (!triggerKey) return;
    const colors = ["#10b981", "#34d399", "#fbbf24", "#ffffff", "#fb923c", "#60a5fa", "#f472b6"];
    const count = 54;
    const p = Array.from({ length: count }, (_, i) => ({
      id: i,
      left: 8 + (i / count) * 84,
      color: colors[i % colors.length],
      size: 5 + (i % 5),
      delay: (i % 12) * 0.032,
      duration: 0.80 + (i % 6) * 0.13,
      dx: ((i % 22) - 11) * 15,
      round: i % 3 !== 0,
    }));
    setParticles(p);
    const t = setTimeout(() => setParticles([]), 2500);
    return () => clearTimeout(t);
  }, [triggerKey]);

  if (!particles.length) return null;

  return (
    <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 60, overflow: "hidden" }}>
      {particles.map((p) => (
        <div
          key={p.id}
          style={{
            position: "absolute",
            left: `${p.left}%`,
            top: "38%",
            width: p.size,
            height: p.size,
            background: p.color,
            borderRadius: p.round ? "50%" : "2px",
            "--cdx": `${p.dx}px`,
            animation: `gfc-confetti-fall ${p.duration}s ${p.delay}s ease-out forwards`,
          }}
        />
      ))}
    </div>
  );
}

/* ---------------------------------------------------------------------------
   useScrollReveal — dispara animação quando a seção entra na viewport.
   ------------------------------------------------------------------------ */
function useScrollReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.05 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible ? "gfc-section-visible" : "gfc-section-hidden"];
}

/* ---------------------------------------------------------------------------
   LiveRanking — ranking global ordenado. User fixo (sticky) no topo.
   FLIP para reordenar suavemente quando totais mudam.
   ------------------------------------------------------------------------ */
function LiveRanking({ countries, userIso2, changedId, motion, bare }) {
  const sorted = [...countries].sort((a, b) => b.total_points - a.total_points);
  const rankOf = {};
  sorted.forEach((c, i) => (rankOf[c.id] = i + 1));

  const userCountry = sorted.find((c) => c.iso2 === userIso2);
  const showSticky = userCountry && rankOf[userCountry.id] > 4;

  const rowRefs = useRef({});
  const prevRects = useRef({});
  useLayoutEffect(() => {
    if (motion === "off") return;
    const newRects = {};
    Object.entries(rowRefs.current).forEach(([id, el]) => {
      if (el) newRects[id] = el.getBoundingClientRect().top;
    });
    Object.entries(newRects).forEach(([id, top]) => {
      const prev = prevRects.current[id];
      const el = rowRefs.current[id];
      if (prev != null && el) {
        const dy = prev - top;
        if (Math.abs(dy) > 1) {
          el.style.transition = "none";
          el.style.transform = `translateY(${dy}px)`;
          requestAnimationFrame(() => {
            el.style.transition = "transform 650ms cubic-bezier(.22,.8,.28,1)";
            el.style.transform = "";
          });
        }
      }
    });
    prevRects.current = newRects;
  });

  const inner = (
    <div className={bare ? "" : "mx-auto max-w-3xl"}>
      <SectionHeading kicker="Ranking en vivo" title="¿Quién está alentando más?" />

      {showSticky && (
        <div className="sticky top-3 z-20 mb-3 mt-4">
          <div className="rounded-2xl bg-[#0a120e]/90 p-1 backdrop-blur-md ring-1 ring-[var(--green)]/40 gfc-box-neon">
            <LeaderboardRow rank={rankOf[userCountry.id]} country={userCountry} isUser={true} justChanged={changedId === userCountry.id} motion={motion} />
          </div>
        </div>
      )}

      <div className="mt-4 flex flex-col gap-2">
        {sorted.map((c) => (
          <LeaderboardRow
            key={c.id}
            ref={(el) => (rowRefs.current[c.id] = el)}
            rank={rankOf[c.id]}
            country={c}
            isUser={c.iso2 === userIso2}
            justChanged={changedId === c.id}
            motion={motion}
          />
        ))}
      </div>
    </div>
  );

  if (bare) return inner;
  return <section className="px-5 py-10 sm:py-14">{inner}</section>;
}

                    <span className="block text-5xl sm:text-6xl leading-none"
                          style={!argLeading ? {filter:"drop-shadow(0 0 14px rgba(251,191,36,0.9))"} : {}}>
                      {bra?.flag_emoji}
                    </span>
                    {!argLeading && (
                      <span className="absolute -top-2 -right-1 rounded-full text-[#04130c] text-[9px] font-extrabold px-1.5 py-0.5 uppercase"
                            style={{background:"var(--gold)",boxShadow:"0 0 8px rgba(251,191,36,0.8)"}}>
                        #1
                      </span>
                    )}
                  </div>
                </div>
              </div>

              {/* ---- Barras de energia ---- */}
              <div className="relative z-10 px-5 pb-5 space-y-4">

                {/* Barra Argentina */}
                <div>
                  <div className="flex items-center justify-between text-[11px] mb-2">
                    <span className="font-bold uppercase tracking-widest gfc-kicker" style={{color:"var(--green-bright)"}}>
                      Argentina · {arg ? arg.total_points.toLocaleString("es-AR") : 0}
                    </span>
                    {argLeading && (
                      <span className="rounded-full px-2 py-0.5 text-[10px] font-extrabold uppercase text-[#04130c]"
                            style={{background:"var(--green)"}}>LIDERANDO</span>
                    )}
                  </div>
                  <div className="relative h-12 sm:h-14 rounded-2xl overflow-visible"
                       style={{background:"rgba(255,255,255,0.05)"}}>
                    {/* barra verde */}
                    <div
                      className={argChanged && motion !== "off" ? "gfc-bar-flash" : ""}
                      style={{
                        position:"absolute", left:0, top:0, bottom:0,
                        width: argPct + "%",
                        minWidth: argPct > 0 ? "48px" : "0px",
                        borderRadius:"0 16px 16px 0",
                        background: argLeading
                          ? "linear-gradient(90deg,#047857,#10b981,#34d399)"
                          : "linear-gradient(90deg,#065f46,#10b981)",
                        boxShadow: argLeading
                          ? "0 0 30px rgba(16,185,129,0.8), inset 0 1px 0 rgba(255,255,255,0.15)"
                          : "0 0 12px rgba(16,185,129,0.4)",
                        transition:"width 0.9s cubic-bezier(0.34,1.56,0.64,1)",
                      }}>
                      {/* shimmer interno */}
                      <div style={{position:"absolute",inset:0,borderRadius:"0 16px 16px 0",
                                   background:"linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.18) 50%,transparent 100%)",
                                   backgroundSize:"200% 100%",animation:"gfc-shimmer 2s linear infinite"}} />
                    </div>
                    {/* boost float */}
                    {argBoostKey > 0 && (
                      <span key={argBoostKey}
                            className="gfc-boost-float absolute right-4 top-1/2 -translate-y-1/2 font-display font-extrabold text-base select-none"
                            style={{color:"var(--green-bright)",textShadow:"0 0 14px rgba(16,185,129,1)"}}>
                        ⚡ BOOST!
                      </span>
                    )}
                  </div>
                </div>

                {/* Barra Brasil */}
                <div>
                  <div className="flex items-center justify-between text-[11px] mb-2">
                    <span className="font-bold uppercase tracking-widest" style={{color:"rgba(251,191,36,0.65)"}}>
                      Brasil · {bra ? bra.total_points.toLocaleString("es-AR") : 0}
                    </span>
                    {!argLeading && (
                      <span className="rounded-full px-2 py-0.5 text-[10px] font-extrabold uppercase text-[#04130c]"
                            style={{background:"var(--gold)"}}>LIDERANDO</span>
                    )}
                  </div>
                  <div className="relative h-12 sm:h-14 rounded-2xl overflow-visible"
                       style={{background:"rgba(255,255,255,0.05)"}}>
                    <div
                      className={braChanged && motion !== "off" ? "gfc-bar-flash-gold" : ""}
                      style={{
                        position:"absolute", left:0, top:0, bottom:0,
                        width: braPct + "%",
                        borderRadius:"0 16px 16px 0",
                        background: !argLeading
                          ? "linear-gradient(90deg,#92400e,#fbbf24,#fde68a)"
                          : "linear-gradient(90deg,#78350f,#fbbf24)",
                        boxShadow: !argLeading
                          ? "0 0 30px rgba(251,191,36,0.8), inset 0 1px 0 rgba(255,255,255,0.15)"
                          : "0 0 12px rgba(251,191,36,0.35)",
                        transition:"width 0.9s cubic-bezier(0.34,1.56,0.64,1)",
                      }}>
                      <div style={{position:"absolute",inset:0,borderRadius:"0 16px 16px 0",
                                   background:"linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.18) 50%,transparent 100%)",
                                   backgroundSize:"200% 100%",animation:"gfc-shimmer 2.5s linear infinite"}} />
                    </div>
                  </div>
                </div>
              </div>

              {/* ---- Status + CTA ---- */}
              <div className="relative z-10 border-t px-5 py-4 flex items-center justify-between gap-4"
                   style={{borderColor:"rgba(16,185,129,0.15)",background:"rgba(0,0,0,0.25)"}}>
                {argLeading ? (
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="text-xl shrink-0">🏆</span>
                    <span className="font-display text-sm font-extrabold truncate" style={{color:"var(--green-bright)"}}>
                      Argentina lidera por {gap.toLocaleString("es-AR")} Glorias
                    </span>
                  </div>
                ) : (
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="text-base shrink-0">⚡</span>
                    <span className="font-display text-sm font-extrabold text-white">
                      Faltan <span style={{color:"var(--gold)"}}>{gap.toLocaleString("es-AR")}</span>{" "}Glorias para liderar
                    </span>
                  </div>
                )}
                <button onClick={scrollToApoiar}
                  className="shrink-0 rounded-xl px-4 py-2.5 font-display text-xs font-extrabold uppercase tracking-wider text-[#04130c] transition-all hover:brightness-110 active:scale-[0.97]"
                  style={{background:"var(--green)",boxShadow:"0 0 16px rgba(16,185,129,0.55)"}}>
                  Dar Glorias
                </button>
              </div>

              {/* KO overlay */}
              {showKO && (
                <div key={koKey} className="gfc-ko-pop absolute inset-0 z-20 flex items-center justify-center">
                  <div className="font-display font-extrabold select-none"
                       style={{fontSize:"96px",lineHeight:1,color:"var(--green)",
                               textShadow:"0 0 50px rgba(16,185,129,1),0 0 100px rgba(16,185,129,0.6)"}}>
                    KO!
                  </div>
                </div>
              )}
            </div>

            {/* ---- Resto do ranking compacto ---- */}
            <div className="mt-6">
              <div className="flex items-center gap-2 text-[11px] font-bold uppercase tracking-[0.22em] mb-3 gfc-kicker"
                   style={{color:"var(--green-bright)"}}>
                <span className="h-px w-6 gfc-neon-green" style={{background:"var(--green)",display:"inline-block"}} />
                Resto del ranking
              </div>
              <div className="flex flex-col gap-1.5">
                {others.map((c) => (
                  <div key={c.id} ref={c.id === changedId ? undefined : undefined}
                       className={"flex items-center gap-3 rounded-xl px-3.5 py-2.5 transition-all " +
                         (c.iso2 === userIso2
                           ? "ring-1 gfc-box-neon"
                           : "bg-white/[0.025] hover:bg-white/[0.04]")}
                       style={c.iso2 === userIso2
                         ? {background:"rgba(16,185,129,0.10)",borderColor:"rgba(16,185,129,0.4)"}
                         : {}}>
                    <span className="font-display font-extrabold text-sm w-6 text-center shrink-0 text-white/30">
                      {rankOf[c.id]}
                    </span>
                    <span className="text-xl leading-none shrink-0">{c.flag_emoji}</span>
                    <span className="flex-1 text-sm font-semibold text-white/80 truncate">{c.name}</span>
                    <span className="font-display text-sm font-extrabold tabular-nums shrink-0"
                          style={{color: changedId === c.id ? "var(--green-bright)" : "rgba(255,255,255,0.40)"}}>
                      {c.total_points.toLocaleString("es-AR")}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ===== FEED lateral ===== */}
          <div className="lg:sticky lg:top-20">
            <LiveFeed log={log} freshId={freshId} motion={motion} bare />
          </div>

        </div>
      </div>
    </section>
  );
}

/* ============================================================================
   GlóriaFC — APP PRINCIPAL
   Estado, tempo real simulado, handler de apoio, tweaks.
   ========================================================================= */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": ["#10b981", "#34d399", "#fbbf24"],
  "numberFont": "condensed",
  "motion": "energetic",
  "liveUpdates": true
}/*EDITMODE-END*/;

const FONT_MAP = {
  condensed: "'Saira Condensed', sans-serif",
  block:     "'Anton', sans-serif",
  heavy:     "'Archivo', sans-serif",
};

let _logId = 1000;
const SUPPORT_POINTS = [100, 500, 1000];
const SAMPLE_NAMES = ["Lucas", "María", "João P.", "Andrés", "Sofia", "Diego", "Hiro", "Anna", "Marco", null, null, "Thiago", "Valentina"];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [countries, setCountries] = useState(() =>
    window.GFC.countries.map((c) => ({ ...c }))
  );
  const [log, setLog] = useState(() =>
    window.GFC.public_log.map((l) => ({ ...l, _id: ++_logId }))
  );
  const [globalToday, setGlobalToday] = useState(284750);
  const [currencyCountry, setCurrencyCountry] = useState(window.GFC.detectedCountry);
  const [displayName, setDisplayName] = useState("");
  const [busyId, setBusyId] = useState(null);
  const [changedId, setChangedId] = useState(null);
  const [freshId, setFreshId] = useState(null);
  const [toast, setToast] = useState(null);
  const [confettiKey, setConfettiKey] = useState(0);

  /* ----- onboarding modal -------------------------------------------- */
  const [showModal, setShowModal] = useState(() => {
    try { return !localStorage.getItem("gfc_user"); } catch(_) { return true; }
  });

  const handleModalComplete = ({ name, iso2 }) => {
    setDisplayName(name);
    setCurrencyCountry(iso2);
    setUserIso2Override(iso2);
    setShowModal(false);
  };

  const [userIso2Override, setUserIso2Override] = useState(() => {
    try {
      const saved = localStorage.getItem("gfc_user");
      return saved ? JSON.parse(saved).iso2 : null;
    } catch(_) { return null; }
  });

  const userIso2 = userIso2Override || window.GFC.detectedCountry;
  const userCountry = countries.find((c) => c.iso2 === userIso2);
  const sortedForRank = [...countries].sort((a, b) => b.total_points - a.total_points);
  const userRank = sortedForRank.findIndex((c) => c.iso2 === userIso2) + 1;

  const brazilCountry = countries.find((c) => c.iso2 === "BR");
  const rivalGap = brazilCountry && userCountry && userIso2 !== "BR"
    ? brazilCountry.total_points - userCountry.total_points
    : null;

  /* ----- aplica tweaks (cores + fonte) -------------------------------- */
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--green", t.accent[0]);
    root.style.setProperty("--green-bright", t.accent[1]);
    root.style.setProperty("--gold", t.accent[2]);
    root.style.setProperty("--font-display", FONT_MAP[t.numberFont] || FONT_MAP.condensed);
  }, [t.accent, t.numberFont]);

  /* ----- helper: aplica pontos a um país e registra no feed ----------- */
  const applyGlory = (countryId, points, name) => {
    setCountries((prev) =>
      prev.map((c) => (c.id === countryId ? { ...c, total_points: c.total_points + points } : c))
    );
    setChangedId(countryId);
    setTimeout(() => setChangedId(null), 1100);
    setGlobalToday((g) => g + points);

    const country = window.GFC.countries.find((c) => c.id === countryId);
    const id = ++_logId;
    setLog((prev) =>
      [{ _id: id, country: country.name, flag_emoji: country.flag_emoji, points, display_name: name || null, created_at: Date.now() }, ...prev].slice(0, 10)
    );
    setFreshId(id);
    setTimeout(() => setFreshId(null), 1000);
  };

  /* ----- detecta retorno do Stripe (?paid= ou ?canceled=) -------------- */
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);

    /* pagamento cancelado */
    if (params.get("canceled")) {
      window.history.replaceState({}, "", "/");
      try { localStorage.removeItem("gfc_pending"); } catch(_) {}
      setToast("Pago cancelado. Puedes intentarlo de nuevo cuando quieras.");
      setTimeout(() => setToast(null), 4000);
      return;
    }

    const paid = params.get("paid");
    if (!paid) return;
    window.history.replaceState({}, "", "/");

    /* dedup: evita aplicar pontos duas vezes se o usuário recarregar a URL */
    const dedupKey = `gfc_applied_${paid}`;
    try {
      if (sessionStorage.getItem(dedupKey)) return;
      sessionStorage.setItem(dedupKey, "1");
    } catch(_) {}

    const pkg = window.GFC.point_packages.find((p) => p.id === paid);
    if (!pkg) return;

    let pendingName = null, pendingCountryId = null;
    try {
      const p = JSON.parse(localStorage.getItem("gfc_pending") || "null");
      /* descarta pending expirado (> 30 min) */
      if (p && p.ts && Date.now() - p.ts < 30 * 60 * 1000) {
        pendingName = p.name;
        pendingCountryId = p.countryId;
      }
      localStorage.removeItem("gfc_pending");
    } catch(_) {}

    const cid = pendingCountryId || window.GFC.countries.find((c) => c.iso2 === (window.GFC.detectedCountry))?.id;
    if (!cid) return;

    const bonus = pkg.bonus || 0;
    const bonusPoints = Math.round(pkg.points * bonus);
    const totalPoints = pkg.points + bonusPoints;
    const country = window.GFC.countries.find((c) => c.id === cid);

    setCountries((prev) => prev.map((c) => c.id === cid ? { ...c, total_points: c.total_points + totalPoints } : c));
    setGlobalToday((g) => g + totalPoints);
    setChangedId(cid);
    setTimeout(() => setChangedId(null), 1100);

    const id = ++_logId;
    setLog((prev) => [{
      _id: id, country: country.name, flag_emoji: country.flag_emoji,
      points: totalPoints, bonusPoints, display_name: pendingName || null,
      created_at: Date.now(), _isUser: true,
    }, ...prev].slice(0, 10));
    setFreshId(id);
    setTimeout(() => setFreshId(null), 1000);

    setConfettiKey((k) => k + 1);
    const bonusMsg = bonusPoints > 0 ? ` (+${bonusPoints.toLocaleString("es-AR")} bonus!)` : "";
    setToast(`+${totalPoints.toLocaleString("es-AR")} Glorias${bonusMsg} para ${country?.flag_emoji} ${country?.name}! ✅`);
    setTimeout(() => setToast(null), 4000);
  }, []);

  /* ----- handler de apoio — redireciona para Stripe -------------------- */
  const [redirectingId, setRedirectingId] = useState(null);

  const onSupport = (packageId, countryId, currency, name) => {
    const pkg = window.GFC.point_packages.find((p) => p.id === packageId);

    if (pkg.stripeUrl) {
      try {
        localStorage.setItem("gfc_pending", JSON.stringify({
          packageId, countryId,
          name: name || displayName,
          ts: Date.now(),
        }));
      } catch(_) {}

      /* Meta Pixel — InitiateCheckout */
      try {
        const usdPrices = { pkg_100: 0.99, pkg_500: 2.99, pkg_1000: 4.99 };
        if (window.fbq) fbq('track', 'InitiateCheckout', {
          currency:     'USD',
          value:        usdPrices[packageId] || 0.99,
          content_ids:  [packageId],
          content_name: pkg.name,
          content_type: 'product',
          num_items:    1,
        });
      } catch(_) {}

      setRedirectingId(packageId);
      setTimeout(() => { window.location.href = pkg.stripeUrl; }, 300);
      return;
    }

    /* fallback simulacao (sem stripeUrl) */
    const bonus = pkg.bonus || 0;
    const bonusPoints = Math.round(pkg.points * bonus);
    const totalPoints = pkg.points + bonusPoints;
    setBusyId(packageId);
    setTimeout(() => {
      /* aplica os pontos totais (base + bonus) */
      const country = window.GFC.countries.find((c) => c.id === countryId);
      setCountries((prev) =>
        prev.map((c) => (c.id === countryId ? { ...c, total_points: c.total_points + totalPoints } : c))
      );
      setChangedId(countryId);
      setTimeout(() => setChangedId(null), 1100);
      setGlobalToday((g) => g + totalPoints);

      /* entrada especial no feed com flag _isUser */
      const id = ++_logId;
      setLog((prev) =>
        [{
          _id: id,
          country: country.name,
          flag_emoji: country.flag_emoji,
          points: totalPoints,
          bonusPoints: bonusPoints,
          display_name: name || displayName || null,
          created_at: Date.now(),
          _isUser: true,
        }, ...prev].slice(0, 10)
      );
      setFreshId(id);
      setTimeout(() => setFreshId(null), 1000);

      setBusyId(null);
      setConfettiKey((k) => k + 1);
      const bonusMsg = bonusPoints > 0 ? ` (+${bonusPoints.toLocaleString("es-AR")} bonus!)` : "";
      setToast(`+${totalPoints.toLocaleString("es-AR")} Glorias${bonusMsg} para ${userCountry.flag_emoji} ${userCountry.name}!`);
      setTimeout(() => setToast(null), 3200);
    }, 650);
  };

  /* ----- tempo real simulado ------------------------------------------ */
  useEffect(() => {
    if (!t.liveUpdates) return;
    const allIds   = window.GFC.countries.map((c) => c.id);
    const brId     = window.GFC.countries.find((c) => c.iso2 === "BR")?.id;
    const arId     = window.GFC.countries.find((c) => c.iso2 === "AR")?.id;
    const otherIds = allIds.filter((id) => id !== brId && id !== arId);

    const interval = setInterval(() => {
      /* Brasil domina o simulador (55%). Argentina quase não recebe pontos
         simulados — o crescimento dela vem só de compras reais.           */
      const roll = Math.random();
      let countryId;
      if (roll < 0.55)      countryId = brId;
      else if (roll < 0.60) countryId = arId;  // 5% apenas
      else                  countryId = otherIds[Math.floor(Math.random() * otherIds.length)];

      const points = SUPPORT_POINTS[Math.floor(Math.random() * SUPPORT_POINTS.length)];
      const name   = SAMPLE_NAMES[Math.floor(Math.random() * SAMPLE_NAMES.length)];
      applyGlory(countryId, points, name);
    }, t.motion === "off" ? 4200 : 2600);
    return () => clearInterval(interval);
  }, [t.liveUpdates, t.motion]);

  /* ----- decaimento de pontos — hinchada esfría sin apoyo ------------- */
  useEffect(() => {
    if (!t.liveUpdates) return;
    const decay = setInterval(() => {
      setCountries((prev) =>
        prev.map((c) => ({
          ...c,
          total_points: Math.max(10000, Math.floor(c.total_points * 0.9992)),
        }))
      );
    }, 60000); // 0,08% a menos por minuto para todos os países
    return () => clearInterval(decay);
  }, [t.liveUpdates]);

  const scrollToApoiar = () => {
    const el = document.getElementById("apoiar");
    if (el) window.scrollTo({ top: el.offsetTop - 12, behavior: "smooth" });
  };

  return (
    <div className="min-h-screen">

      {/* ===== HEADER / LOGO ===== */}
      <nav className="sticky top-0 z-50 px-5 py-3 flex items-center backdrop-blur-md border-b"
           style={{background: "rgba(7,11,10,0.88)", borderColor: "rgba(16,185,129,0.15)"}}>
        <div className="mx-auto max-w-5xl w-full flex items-center justify-between">
          {/* Logo */}
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-lg flex items-center justify-center gfc-box-neon"
                 style={{background: "rgba(16,185,129,0.15)", border: "1px solid rgba(16,185,129,0.4)"}}>
              <span className="font-display text-sm font-extrabold" style={{color: "var(--green)"}}>G</span>
            </div>
            <span className="font-display text-xl font-extrabold tracking-tight text-white">
              Gloria<span style={{color: "var(--green)", textShadow: "0 0 12px rgba(16,185,129,0.8)"}}>FC</span>
            </span>
          </div>

          {/* Live badge + CTA desktop */}
          <div className="flex items-center gap-4">
            <div className="hidden sm:flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-widest"
                 style={{color: "var(--green-bright)"}}>
              <span className="relative flex h-2 w-2">
                <span className="absolute inline-flex h-full w-full animate-ping rounded-full bg-[var(--green)] opacity-75" />
                <span className="relative inline-flex h-2 w-2 rounded-full gfc-live-core" style={{background: "var(--green)"}} />
              </span>
              En vivo
            </div>
            <button onClick={scrollToApoiar}
              className="hidden sm:inline-flex items-center gap-1.5 rounded-xl px-4 py-2 font-display text-sm font-extrabold uppercase tracking-wider text-[#04130c] transition-all hover:brightness-110 active:scale-[0.97]"
              style={{background: "var(--green)", boxShadow: "0 0 16px rgba(16,185,129,0.45)"}}>
              Dar Glorias
            </button>
          </div>
        </div>
      </nav>

      <HeroScoreboard
        userCountry={userCountry}
        userRank={userRank}
        globalToday={globalToday}
        rivalGap={rivalGap}
        onCTA={scrollToApoiar}
      />

      {/* Pacotes PRIMEIRO — máxima visibilidade */}
      <SupportSection
        packages={window.GFC.point_packages}
        countries={countries}
        currencyCountry={currencyCountry}
        onCurrencyChange={setCurrencyCountry}
        displayName={displayName}
        onNameChange={setDisplayName}
        onSupport={onSupport}
        busyId={busyId}
        redirectingId={redirectingId}
        userCountry={userCountry}
        rivalGap={rivalGap}
        brazilPoints={brazilCountry ? brazilCountry.total_points : 0}
      />

      {/* ===== BATTLE BARS ===== */}
      <BattleSection
        countries={countries}
        userIso2={userIso2}
        changedId={changedId}
        motion={t.motion}
        log={log}
        freshId={freshId}
      />

      <SiteFooter />

      {/* CTA fixo no mobile */}
      <div className="fixed inset-x-0 bottom-0 z-30 border-t border-white/10 bg-[#070b0a]/90 px-4 py-3 backdrop-blur-md sm:hidden">
        <button
          onClick={scrollToApoiar}
          className="gfc-cta-pulse w-full rounded-2xl bg-[var(--green)] py-4 font-display text-lg font-extrabold uppercase tracking-wider text-[#04130c] shadow-lg active:scale-[0.98] transition-transform"
        >
          Dar Glorias
        </button>
      </div>

      {/* confetti ao apoiar */}
      <ConfettiBurst triggerKey={confettiKey} />

      {/* modal de onboarding */}
      {showModal && (
        <OnboardingModal
          countries={window.GFC.countries}
          onComplete={handleModalComplete}
        />
      )}

      {/* toast de confirmação */}
      {toast && (
        <div className="fixed bottom-24 sm:bottom-6 left-1/2 z-40 -translate-x-1/2 gfc-toast">
          <div className="rounded-2xl bg-[var(--green)] px-5 py-3 font-display text-sm font-extrabold uppercase tracking-wide text-[#04130c] shadow-2xl">
            {toast}
          </div>
        </div>
      )}

      {/* ----- Tweaks ----- */}
      <TweaksPanel>
        <TweakSection label="Visual" />
        <TweakColor
          label="Color"
          value={t.accent}
          options={[
            ["#10b981", "#34d399", "#fbbf24"],
            ["#22c55e", "#4ade80", "#f59e0b"],
            ["#14b8a6", "#2dd4bf", "#fb923c"],
          ]}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakRadio
          label="Fuente de números"
          value={t.numberFont}
          options={["condensed", "block", "heavy"]}
          onChange={(v) => setTweak("numberFont", v)}
        />
        <TweakSection label="Movimiento" />
        <TweakRadio
          label="Intensidad"
          value={t.motion}
          options={["subtle", "energetic", "off"]}
          onChange={(v) => setTweak("motion", v)}
        />
        <TweakToggle
          label="Actualizaciones en vivo"
          value={t.liveUpdates}
          onChange={(v) => setTweak("liveUpdates", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
