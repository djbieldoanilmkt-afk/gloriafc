<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GlóriaFC — Marcador mundial de hinchada</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Saira+Condensed:wght@600;700;800;900&family=Anton&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Archivo", "system-ui", "sans-serif"],
            display: ["var(--font-display)", "Saira Condensed", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --bg: #070b0a;
      --bg-2: #0d1411;
      --green: #10b981;
      --green-bright: #34d399;
      --gold: #fbbf24;
      --font-display: 'Saira Condensed', sans-serif;
    }
    html { background: var(--bg); }
    body {
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(16,185,129,0.10), transparent 60%),
        var(--bg);
      color: #f4f7f5;
      font-family: 'Archivo', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .font-display { font-family: var(--font-display); }

    /* faint pitch-line texture overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 119px, rgba(255,255,255,0.014) 119px, rgba(255,255,255,0.014) 120px
      );
    }
    #root { position: relative; z-index: 1; }

    /* pulso quando um valor atualiza */
    @keyframes gfc-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.16); }
      100% { transform: scale(1); }
    }
    .gfc-pop { animation: gfc-pop 0.6s cubic-bezier(.34,1.56,.64,1); }

    /* item novo do feed deslizando */
    @keyframes gfc-slide-in {
      0%   { opacity: 0; transform: translateY(-14px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .gfc-slide-in { animation: gfc-slide-in 0.5s cubic-bezier(.22,.8,.28,1); }

    /* toast */
    @keyframes gfc-toast {
      0%   { opacity: 0; transform: translate(-50%, 16px) scale(0.95); }
      12%  { opacity: 1; transform: translate(-50%, 0) scale(1); }
      88%  { opacity: 1; transform: translate(-50%, 0) scale(1); }
      100% { opacity: 0; transform: translate(-50%, 8px) scale(0.98); }
    }
    .gfc-toast { animation: gfc-toast 2.6s ease forwards; }

    /* === Hero entrance — elementos entram em sequência === */
    @keyframes gfc-fade-up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .gfc-enter { opacity: 0; animation: gfc-fade-up 0.65s cubic-bezier(.22,.8,.28,1) forwards; }
    .gfc-enter-1 { animation-delay: 0.05s; }
    .gfc-enter-2 { animation-delay: 0.18s; }
    .gfc-enter-3 { animation-delay: 0.30s; }
    .gfc-enter-4 { animation-delay: 0.44s; }
    .gfc-enter-5 { animation-delay: 0.58s; }
    .gfc-enter-6 { animation-delay: 0.70s; }

    /* === Shimmer nos top 3 do ranking === */
    @keyframes gfc-shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }
    .gfc-rank-shimmer {
      background: linear-gradient(90deg, #c88c00 15%, #fff8c0 46%, #fbbf24 56%, #c88c00 85%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gfc-shimmer 3s linear infinite;
    }
    .gfc-rank-shimmer-2 {
      background: linear-gradient(90deg, #8aa49e 15%, #eaf3f0 46%, #d6e4dc 56%, #8aa49e 85%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gfc-shimmer 3.4s linear infinite;
    }
    .gfc-rank-shimmer-3 {
      background: linear-gradient(90deg, #a85c28 15%, #f5cfa0 46%, #e8a87c 56%, #a85c28 85%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gfc-shimmer 3.8s linear infinite;
    }

    /* === Seta flutuante quando país sobe de posição === */
    @keyframes gfc-rise {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.3); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-22px) scale(0.85); }
    }
    .gfc-rise-badge { animation: gfc-rise 1.3s cubic-bezier(.22,.8,.28,1) forwards; }

    /* === Pulso heartbeat no botão CTA === */
    @keyframes gfc-cta-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.50), 0 20px 40px -12px rgba(16,185,129,0.30); }
      55%       { box-shadow: 0 0 0 18px rgba(16,185,129,0),  0 20px 40px -12px rgba(16,185,129,0.30); }
    }
    .gfc-cta-pulse { animation: gfc-cta-pulse 2.4s ease-out infinite; }

    /* === Scroll reveal para seções abaixo da dobra === */
    @keyframes gfc-reveal {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .gfc-section-hidden  { opacity: 0; }
    .gfc-section-visible { animation: gfc-reveal 0.72s cubic-bezier(.22,.8,.28,1) forwards; }

    /* === Hover lift nos cards de pacote === */
    .gfc-card-hover:hover { transform: translateY(-4px); }

    /* === Confetti ao apoiar === */
    @keyframes gfc-confetti-fall {
      0%   { opacity: 1; transform: translateY(-10px) translateX(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(300px) translateX(var(--cdx)) rotate(600deg) scale(0.35); }
    }

    select option { background: #0d1411; }
    ::selection { background: var(--green); color: #04130c; }
  </style>
</head>
